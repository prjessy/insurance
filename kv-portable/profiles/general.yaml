# 산업 프로파일: 일반 관리 / 범용 (카테고리: 관리)
# 특정 도메인이 없을 때 기본으로 쓰는 중립 프로파일.
# config.yaml 에서  profile: general  로 활성화.
name: 일반관리
category: 관리

labels:
  entity: 대상
  catalog: 항목
  record: 기록
  records: 기록모음
  proposal: 보고서
  message: 안내
  channel: 경로
  date: 일자

folders:
  entity_db: 대상DB
  catalog_db: 항목DB
  records: 기록
  queue: AI작업큐

record_tags:
  - 기록
  - 수집/자동

prompts:
  summarize: |
    너는 자료 정리 비서야. 아래 전사/메모 내용을 읽고 다음 형식으로 정리해줘.
    입력된 정보만 사용하고 추측하지 마.

    # 핵심 요약 (3줄 이내)
    # 주요 내용
    # 파악된 정보 (항목별)
    # 다음 액션 (체크리스트)

    [내용]
    """
    여기에 붙여넣기
    """
  propose: |
    아래 [대상 정보]와 [항목 목록]을 바탕으로, 이 대상에 맞는 보고서를 작성해줘.
    - 상황을 근거로 1~2개 항목 추천
    - 각 항목마다 한 문장 근거 포함
    - 표로 비교
    - 마지막에 요약 2~3줄

    [대상 정보]
    """
    대상DB 노트 내용 붙여넣기
    """

    [항목 목록]
    """
    항목DB 노트들 붙여넣기
    """
  message: |
    아래 대상에게 보낼 짧은 안내 메시지를 작성해줘.
    - 3~4문장, 명확하고 부담 없게
    - 과장·확정적 표현 금지

    [대상 정보]
    """
    대상DB 노트 내용 붙여넣기
    """
