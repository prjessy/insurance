# 산업 프로파일: 기술지원 / 고객지원 (카테고리: 기술)
# config.yaml 에서  profile: support  로 활성화.
name: 기술지원
category: 기술

labels:
  entity: 요청자
  catalog: 해결책
  record: 처리
  records: 처리이력
  proposal: 해결 보고서
  message: 안내 메시지
  channel: 접수경로
  date: 접수일

folders:
  entity_db: 요청자DB
  catalog_db: 해결책DB
  records: 처리이력
  queue: AI작업큐

record_tags:
  - 처리
  - painpoint/녹취정리
  - 수집/자동

prompts:
  summarize: |
    너는 기술지원 처리 정리 비서야. 아래 문의/통화 전사 내용을 읽고 다음 형식으로 정리해줘.
    개인정보·내부정보는 입력된 것만 사용하고 추측하지 마.

    # 핵심 요약 (3줄 이내)
    # 요청/증상
    # 파악된 정보
    - 환경/제품:
    - 재현 조건:
    - 긴급도 태그: (긴급 / 일반 / 보류 중 해당)
    # 다음 액션 (체크리스트)

    [전사 내용]
    """
    여기에 붙여넣기
    """
  propose: |
    아래 [요청자 정보]와 [해결책 목록]을 바탕으로, 이 건에 맞는 해결 방안을 작성해줘.
    - 증상·환경·긴급도를 근거로 1~2개 해결책 추천
    - 각 해결책마다 "왜 이 건에 맞는지" 한 문장 근거 포함
    - 표로 적용 난이도·예상 소요시간 비교
    - 마지막에 적용 절차 요약 2~3줄

    [요청자 정보]
    """
    요청자DB 노트 내용 붙여넣기
    """

    [해결책 목록]
    """
    해결책DB 노트들 붙여넣기
    """
  message: |
    아래 요청자에게 보낼 짧은 안내 메시지(메일/메신저용)를 작성해줘.
    - 긴급도 태그에 맞는 톤
    - 3~4문장, 명확하게, 다음 조치/일정을 안내
    - 과장·확정적 표현 금지

    [요청자 정보]
    """
    요청자DB 노트 내용 붙여넣기
    """
