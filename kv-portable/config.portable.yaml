# 배포(exe)용 기본 설정 — 첫 실행 시 exe 옆에 config.yaml 로 복사됨.
# 데이터(고객DB·상담기록·inbox·vault)는 모두 exe 가 있는 폴더 기준(".").

profile: finance              # finance(금융) / support(기술지원) / general(일반)

obsidian_vault: "."           # exe 옆 폴더를 볼트로 사용
obsidian_subfolder: KnowledgeVault
obsidian_routes:
  audio: 상담기록
  default: KnowledgeVault
obsidian_sync_auto: true

reference_paths: []           # 비우면 프로파일 기본 폴더(고객DB/상품DB/상담기록) 자동 사용

exclude_dirs: [.git, node_modules]

# 문서 변환: MarkItDown 설치 시 우선
use_markitdown: true

# === LLM (사내/외부 OpenAI 호환 게이트웨이) ===
# 키·엔드포인트·모델은 exe 옆 key.txt 에서 읽음 (각자 본인 key.txt 준비).
#   key.txt 예:
#     LLM_ENDPOINT=https://lsap.lsware.net
#     LLM_MODEL=qwen3.5-122b-fast
#     LLM_API_KEY=발급받은키
llm:
  enabled: true
  provider: openai
  api_key_file: key.txt
  base_url: ""
  model: ""
  api_key_env: KV_LLM_API_KEY
  timeout: 120

source_tags:
  audio: [수집/녹음, 상담/전사]
  image: [수집/사진, 형식/OCR]
  excel: [수집/엑셀, 형식/표]
  notes: [수집/노트]
  pdf: [수집/문서, 형식/PDF]
  pptx: [수집/문서, 형식/슬라이드]
  hwp: [수집/문서, 형식/한글]

refined_tag: 상태/정제완료
index_db: index/search.db
